<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="hc-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060a14"/>
      <stop offset="50%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#080d17"/>
    </linearGradient>
    <radialGradient id="hc-center-glow" cx="0.5" cy="0.48" r="0.35">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.07"/>
      <stop offset="50%" stop-color="#1a8a9e" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#0a0f1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hc-glow2" cx="0.5" cy="0.48" r="0.2">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0a0f1a" stop-opacity="0"/>
    </radialGradient>
    <filter id="hc-blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="hc-glow-filter">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="hc-soft">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#hc-bg)"/>

  <!-- Central radial glow -->
  <rect width="800" height="500" fill="url(#hc-center-glow)"/>
  <ellipse cx="400" cy="240" rx="200" ry="180" fill="url(#hc-glow2)"/>

  <!-- Deep background faint concentric rings -->
  <g fill="none" stroke="#22d3ee" opacity="0.03">
    <circle cx="400" cy="240" r="80"/>
    <circle cx="400" cy="240" r="130"/>
    <circle cx="400" cy="240" r="180"/>
    <circle cx="400" cy="240" r="240"/>
    <circle cx="400" cy="240" r="310"/>
  </g>

  <!-- Connection lines (thin molecular bonds) -->
  <g stroke="#22d3ee" stroke-width="0.6" opacity="0.1">
    <!-- Central cluster connections -->
    <line x1="400" y1="240" x2="350" y2="190"/>
    <line x1="400" y1="240" x2="460" y2="200"/>
    <line x1="400" y1="240" x2="380" y2="300"/>
    <line x1="400" y1="240" x2="440" y2="280"/>
    <line x1="400" y1="240" x2="340" y2="260"/>
    <line x1="400" y1="240" x2="450" y2="240"/>
    <line x1="400" y1="240" x2="360" y2="220"/>

    <!-- Secondary connections -->
    <line x1="350" y1="190" x2="290" y2="150"/>
    <line x1="350" y1="190" x2="310" y2="210"/>
    <line x1="350" y1="190" x2="380" y2="140"/>
    <line x1="460" y1="200" x2="520" y2="170"/>
    <line x1="460" y1="200" x2="510" y2="230"/>
    <line x1="460" y1="200" x2="490" y2="150"/>
    <line x1="380" y1="300" x2="340" y2="350"/>
    <line x1="380" y1="300" x2="420" y2="350"/>
    <line x1="380" y1="300" x2="310" y2="320"/>
    <line x1="440" y1="280" x2="500" y2="310"/>
    <line x1="440" y1="280" x2="480" y2="330"/>
    <line x1="340" y1="260" x2="270" y2="280"/>
    <line x1="340" y1="260" x2="290" y2="240"/>

    <!-- Tertiary / peripheral connections -->
    <line x1="290" y1="150" x2="230" y2="120"/>
    <line x1="290" y1="150" x2="250" y2="180"/>
    <line x1="520" y1="170" x2="580" y2="140"/>
    <line x1="520" y1="170" x2="570" y2="200"/>
    <line x1="340" y1="350" x2="300" y2="400"/>
    <line x1="340" y1="350" x2="380" y2="390"/>
    <line x1="500" y1="310" x2="560" y2="340"/>
    <line x1="500" y1="310" x2="540" y2="290"/>
    <line x1="270" y1="280" x2="210" y2="310"/>
    <line x1="270" y1="280" x2="220" y2="260"/>
    <line x1="490" y1="150" x2="540" y2="110"/>

    <!-- Far peripheral -->
    <line x1="230" y1="120" x2="170" y2="90"/>
    <line x1="230" y1="120" x2="190" y2="150"/>
    <line x1="580" y1="140" x2="640" y2="110"/>
    <line x1="580" y1="140" x2="630" y2="170"/>
    <line x1="300" y1="400" x2="250" y2="430"/>
    <line x1="380" y1="390" x2="430" y2="420"/>
    <line x1="560" y1="340" x2="610" y2="370"/>
    <line x1="210" y1="310" x2="160" y2="340"/>
    <line x1="170" y1="90" x2="110" y2="70"/>
    <line x1="640" y1="110" x2="700" y2="90"/>
    <line x1="610" y1="370" x2="660" y2="400"/>
    <line x1="160" y1="340" x2="110" y2="370"/>

    <!-- Cross-connections for network feel -->
    <line x1="310" y1="210" x2="290" y2="240"/>
    <line x1="510" y1="230" x2="540" y2="290"/>
    <line x1="480" y1="330" x2="420" y2="350"/>
    <line x1="250" y1="180" x2="220" y2="260"/>
    <line x1="570" y1="200" x2="540" y2="290"/>
    <line x1="310" y1="320" x2="340" y2="350"/>
  </g>

  <!-- Faint double-bond lines (molecular detail) -->
  <g stroke="#22d3ee" stroke-width="0.3" opacity="0.06">
    <line x1="402" y1="242" x2="352" y2="192"/>
    <line x1="398" y1="238" x2="348" y2="188"/>
    <line x1="402" y1="242" x2="462" y2="202"/>
    <line x1="382" y1="302" x2="342" y2="352"/>
    <line x1="442" y1="282" x2="502" y2="312"/>
  </g>

  <!-- Central main node (largest, with orbital rings) -->
  <g>
    <circle cx="400" cy="240" r="20" fill="#22d3ee" opacity="0.04" filter="url(#hc-soft)"/>
    <circle cx="400" cy="240" r="14" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.12"/>
    <circle cx="400" cy="240" r="9" fill="none" stroke="#22d3ee" stroke-width="0.6" opacity="0.18"/>
    <circle cx="400" cy="240" r="4.5" fill="#22d3ee" opacity="0.25"/>
    <circle cx="400" cy="240" r="2" fill="#22d3ee" opacity="0.4"/>
    <!-- Orbital electron dots -->
    <circle cx="414" cy="240" r="1" fill="#22d3ee" opacity="0.3"/>
    <circle cx="393" cy="249" r="1" fill="#22d3ee" opacity="0.3"/>
    <circle cx="400" cy="226" r="0.8" fill="#22d3ee" opacity="0.25"/>
  </g>

  <!-- Primary cluster nodes (with concentric rings) -->
  <g>
    <!-- Node at 350,190 -->
    <circle cx="350" cy="190" r="10" fill="#22d3ee" opacity="0.03" filter="url(#hc-blur)"/>
    <circle cx="350" cy="190" r="8" fill="none" stroke="#22d3ee" stroke-width="0.4" opacity="0.1"/>
    <circle cx="350" cy="190" r="3.5" fill="#22d3ee" opacity="0.2"/>
    <circle cx="350" cy="190" r="1.5" fill="#22d3ee" opacity="0.35"/>

    <!-- Node at 460,200 -->
    <circle cx="460" cy="200" r="10" fill="#22d3ee" opacity="0.03" filter="url(#hc-blur)"/>
    <circle cx="460" cy="200" r="8" fill="none" stroke="#22d3ee" stroke-width="0.4" opacity="0.1"/>
    <circle cx="460" cy="200" r="3.5" fill="#22d3ee" opacity="0.2"/>
    <circle cx="460" cy="200" r="1.5" fill="#22d3ee" opacity="0.35"/>

    <!-- Node at 380,300 -->
    <circle cx="380" cy="300" r="9" fill="#22d3ee" opacity="0.03" filter="url(#hc-blur)"/>
    <circle cx="380" cy="300" r="7" fill="none" stroke="#22d3ee" stroke-width="0.4" opacity="0.1"/>
    <circle cx="380" cy="300" r="3" fill="#22d3ee" opacity="0.2"/>
    <circle cx="380" cy="300" r="1.3" fill="#22d3ee" opacity="0.35"/>

    <!-- Node at 440,280 -->
    <circle cx="440" cy="280" r="8" fill="#22d3ee" opacity="0.03" filter="url(#hc-blur)"/>
    <circle cx="440" cy="280" r="6" fill="none" stroke="#22d3ee" stroke-width="0.4" opacity="0.1"/>
    <circle cx="440" cy="280" r="2.8" fill="#22d3ee" opacity="0.2"/>
    <circle cx="440" cy="280" r="1.2" fill="#22d3ee" opacity="0.35"/>

    <!-- Node at 340,260 -->
    <circle cx="340" cy="260" r="7" fill="#22d3ee" opacity="0.03" filter="url(#hc-blur)"/>
    <circle cx="340" cy="260" r="5.5" fill="none" stroke="#22d3ee" stroke-width="0.4" opacity="0.09"/>
    <circle cx="340" cy="260" r="2.5" fill="#22d3ee" opacity="0.18"/>
    <circle cx="340" cy="260" r="1.2" fill="#22d3ee" opacity="0.3"/>
  </g>

  <!-- Secondary nodes (smaller, some with rings) -->
  <g>
    <circle cx="290" cy="150" r="5" fill="none" stroke="#22d3ee" stroke-width="0.3" opacity="0.08"/>
    <circle cx="290" cy="150" r="2.2" fill="#22d3ee" opacity="0.18"/>

    <circle cx="310" cy="210" r="2" fill="#22d3ee" opacity="0.15"/>

    <circle cx="380" cy="140" r="4" fill="none" stroke="#22d3ee" stroke-width="0.3" opacity="0.08"/>
    <circle cx="380" cy="140" r="1.8" fill="#22d3ee" opacity="0.18"/>

    <circle cx="520" cy="170" r="5" fill="none" stroke="#22d3ee" stroke-width="0.3" opacity="0.08"/>
    <circle cx="520" cy="170" r="2.2" fill="#22d3ee" opacity="0.18"/>

    <circle cx="510" cy="230" r="2" fill="#22d3ee" opacity="0.15"/>

    <circle cx="490" cy="150" r="4" fill="none" stroke="#22d3ee" stroke-width="0.3" opacity="0.08"/>
    <circle cx="490" cy="150" r="1.8" fill="#22d3ee" opacity="0.16"/>

    <circle cx="340" cy="350" r="5" fill="none" stroke="#22d3ee" stroke-width="0.3" opacity="0.08"/>
    <circle cx="340" cy="350" r="2.2" fill="#22d3ee" opacity="0.18"/>

    <circle cx="420" cy="350" r="2" fill="#22d3ee" opacity="0.15"/>

    <circle cx="310" cy="320" r="1.8" fill="#22d3ee" opacity="0.14"/>

    <circle cx="500" cy="310" r="4.5" fill="none" stroke="#22d3ee" stroke-width="0.3" opacity="0.08"/>
    <circle cx="500" cy="310" r="2" fill="#22d3ee" opacity="0.17"/>

    <circle cx="480" cy="330" r="1.8" fill="#22d3ee" opacity="0.14"/>

    <circle cx="270" cy="280" r="4" fill="none" stroke="#22d3ee" stroke-width="0.3" opacity="0.07"/>
    <circle cx="270" cy="280" r="1.8" fill="#22d3ee" opacity="0.16"/>

    <circle cx="290" cy="240" r="1.8" fill="#22d3ee" opacity="0.14"/>

    <circle cx="450" cy="240" r="2" fill="#22d3ee" opacity="0.15"/>
    <circle cx="360" cy="220" r="2" fill="#22d3ee" opacity="0.15"/>
  </g>

  <!-- Tertiary nodes (small, no rings) -->
  <g fill="#22d3ee">
    <circle cx="230" cy="120" r="1.8" opacity="0.14"/>
    <circle cx="250" cy="180" r="1.5" opacity="0.12"/>
    <circle cx="580" cy="140" r="1.8" opacity="0.14"/>
    <circle cx="570" cy="200" r="1.5" opacity="0.12"/>
    <circle cx="300" cy="400" r="1.8" opacity="0.14"/>
    <circle cx="380" cy="390" r="1.5" opacity="0.12"/>
    <circle cx="560" cy="340" r="1.8" opacity="0.14"/>
    <circle cx="540" cy="290" r="1.5" opacity="0.12"/>
    <circle cx="210" cy="310" r="1.5" opacity="0.12"/>
    <circle cx="220" cy="260" r="1.5" opacity="0.11"/>
    <circle cx="540" cy="110" r="1.3" opacity="0.11"/>
  </g>

  <!-- Far peripheral nodes (barely visible) -->
  <g fill="#22d3ee">
    <circle cx="170" cy="90" r="1.3" opacity="0.1"/>
    <circle cx="190" cy="150" r="1.2" opacity="0.09"/>
    <circle cx="640" cy="110" r="1.3" opacity="0.1"/>
    <circle cx="630" cy="170" r="1.2" opacity="0.09"/>
    <circle cx="250" cy="430" r="1.2" opacity="0.09"/>
    <circle cx="430" cy="420" r="1.2" opacity="0.09"/>
    <circle cx="610" cy="370" r="1.3" opacity="0.1"/>
    <circle cx="160" cy="340" r="1.2" opacity="0.09"/>
    <circle cx="110" cy="70" r="1" opacity="0.07"/>
    <circle cx="700" cy="90" r="1" opacity="0.07"/>
    <circle cx="660" cy="400" r="1" opacity="0.07"/>
    <circle cx="110" cy="370" r="1" opacity="0.07"/>
  </g>

  <!-- Scattered ambient particles -->
  <g fill="#22d3ee" opacity="0.06">
    <circle cx="80" cy="160" r="0.6"/>
    <circle cx="720" cy="250" r="0.7"/>
    <circle cx="50" cy="400" r="0.5"/>
    <circle cx="750" cy="430" r="0.6"/>
    <circle cx="130" cy="450" r="0.5"/>
    <circle cx="670" cy="460" r="0.5"/>
    <circle cx="90" cy="30" r="0.5"/>
    <circle cx="730" cy="40" r="0.5"/>
    <circle cx="400" cy="460" r="0.6"/>
    <circle cx="550" cy="450" r="0.5"/>
    <circle cx="200" cy="40" r="0.5"/>
    <circle cx="600" cy="30" r="0.5"/>
  </g>

  <!-- Vignette -->
  <radialGradient id="hc-vignette" cx="0.5" cy="0.48" r="0.65">
    <stop offset="0%" stop-color="#0a0f1a" stop-opacity="0"/>
    <stop offset="100%" stop-color="#060a14" stop-opacity="0.6"/>
  </radialGradient>
  <rect width="800" height="500" fill="url(#hc-vignette)"/>
</svg>