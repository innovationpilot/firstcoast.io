<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 960" role="img" aria-labelledby="title desc">
  <title id="title">First Coast AI hero illustration</title>
  <desc id="desc">A Jacksonville-inspired skyline connected to glowing AI network paths in cyan, blue, coral, and amber.</desc>
  <defs>
    <linearGradient id="bg" x1="160" y1="40" x2="1100" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#11284d"/>
      <stop offset="0.55" stop-color="#081327"/>
      <stop offset="1" stop-color="#060d1a"/>
    </linearGradient>
    <radialGradient id="glow-cyan" cx="0" cy="0" r="1" gradientTransform="translate(340 260) rotate(90) scale(220 260)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-warm" cx="0" cy="0" r="1" gradientTransform="translate(945 278) rotate(90) scale(208 248)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff9a62" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#ff9a62" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beam" x1="300" y1="184" x2="938" y2="650" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.48" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <linearGradient id="beam-soft" x1="192" y1="562" x2="1048" y2="428" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#f8b84a"/>
    </linearGradient>
    <linearGradient id="skyline" x1="144" y1="660" x2="1136" y2="872" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#15325d"/>
      <stop offset="1" stop-color="#0c172c"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="rgba(148, 182, 237, 0.14)" stroke-width="1"/>
    </pattern>
    <filter id="blur">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

