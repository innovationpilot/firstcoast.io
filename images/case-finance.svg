<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="fin-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060a14"/>
      <stop offset="50%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#080d17"/>
    </linearGradient>
    <radialGradient id="fin-hub1-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0a0f1a" stop-opacity="0"/>
    </radialGradient>
    <filter id="fin-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="fin-soft">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#fin-bg)"/>

  <!-- Subtle ambient glows behind hub nodes -->
  <circle cx="300" cy="200" r="80" fill="#22d3ee" opacity="0.02" filter="url(#fin-soft)"/>
  <circle cx="550" cy="280" r="70" fill="#22d3ee" opacity="0.018" filter="url(#fin-soft)"/>
  <circle cx="180" cy="350" r="60" fill="#22d3ee" opacity="0.015" filter="url(#fin-soft)"/>
  <circle cx="650" cy="150" r="55" fill="#22d3ee" opacity="0.015" filter="url(#fin-soft)"/>

  <!-- ============================================ -->
  <!-- CONNECTION LINES (solid, between nearby nodes) -->
  <!-- ============================================ -->
  <g stroke="#22d3ee" stroke-width="0.5" opacity="0.08">
    <!-- Hub 1 (300,200) connections -->
    <line x1="300" y1="200" x2="240" y2="160"/>
    <line x1="300" y1="200" x2="350" y2="150"/>
    <line x1="300" y1="200" x2="370" y2="210"/>
    <line x1="300" y1="200" x2="280" y2="270"/>
    <line x1="300" y1="200" x2="230" y2="220"/>
    <line x1="300" y1="200" x2="320" y2="140"/>
    <line x1="300" y1="200" x2="260" y2="250"/>
    <line x1="300" y1="200" x2="350" y2="250"/>
    <line x1="300" y1="200" x2="220" y2="180"/>
    <line x1="300" y1="200" x2="340" y2="180"/>

    <!-- Hub 2 (550,280) connections -->
    <line x1="550" y1="280" x2="500" y2="250"/>
    <line x1="550" y1="280" x2="610" y2="260"/>
    <line x1="550" y1="280" x2="580" y2="340"/>
    <line x1="550" y1="280" x2="490" y2="310"/>
    <line x1="550" y1="280" x2="600" y2="300"/>
    <line x1="550" y1="280" x2="530" y2="220"/>
    <line x1="550" y1="280" x2="510" y2="330"/>
    <line x1="550" y1="280" x2="590" y2="230"/>
    <line x1="550" y1="280" x2="480" y2="270"/>

    <!-- Hub 3 (180,350) connections -->
    <line x1="180" y1="350" x2="130" y2="320"/>
    <line x1="180" y1="350" x2="220" y2="380"/>
    <line x1="180" y1="350" x2="150" y2="400"/>
    <line x1="180" y1="350" x2="240" y2="340"/>
    <line x1="180" y1="350" x2="120" y2="370"/>
    <line x1="180" y1="350" x2="200" y2="300"/>
    <line x1="180" y1="350" x2="160" y2="410"/>
    <line x1="180" y1="350" x2="230" y2="310"/>

    <!-- Hub 4 (650,150) connections -->
    <line x1="650" y1="150" x2="700" y2="130"/>
    <line x1="650" y1="150" x2="610" y2="120"/>
    <line x1="650" y1="150" x2="690" y2="180"/>
    <line x1="650" y1="150" x2="620" y2="180"/>
    <line x1="650" y1="150" x2="680" y2="100"/>
    <line x1="650" y1="150" x2="600" y2="160"/>
    <line x1="650" y1="150" x2="710" y2="160"/>

    <!-- Inter-hub connections -->
    <line x1="370" y1="210" x2="480" y2="270"/>
    <line x1="350" y1="250" x2="490" y2="310"/>
    <line x1="280" y1="270" x2="240" y2="340"/>
    <line x1="530" y1="220" x2="590" y2="230"/>
    <line x1="590" y1="230" x2="620" y2="180"/>

    <!-- Cross-network connections -->
    <line x1="240" y1="160" x2="200" y2="120"/>
    <line x1="350" y1="150" x2="400" y2="110"/>
    <line x1="500" y1="250" x2="460" y2="200"/>
    <line x1="610" y1="260" x2="660" y2="230"/>
    <line x1="580" y1="340" x2="620" y2="380"/>
    <line x1="130" y1="320" x2="100" y2="280"/>
    <line x1="220" y1="380" x2="270" y2="410"/>
    <line x1="700" y1="130" x2="740" y2="100"/>
    <line x1="610" y1="120" x2="570" y2="90"/>
    <line x1="150" y1="400" x2="110" y2="430"/>
    <line x1="200" y1="300" x2="230" y2="220"/>
  </g>

  <!-- DASHED DATA FLOW LINES -->
  <g fill="none" stroke="#22d3ee" stroke-width="0.6" stroke-dasharray="3,5" opacity="0.06">
    <!-- Flow from Hub1 to Hub2 -->
    <path d="M300,200 C380,200 470,260 550,280"/>
    <!-- Flow from Hub3 to Hub1 -->
    <path d="M180,350 C200,300 250,240 300,200"/>
    <!-- Flow from Hub4 to Hub2 -->
    <path d="M650,150 C640,200 600,250 550,280"/>
    <!-- Flow from Hub1 to Hub4 -->
    <path d="M300,200 C400,160 550,140 650,150"/>
    <!-- Flow from Hub3 to Hub2 -->
    <path d="M180,350 C300,380 450,330 550,280"/>
  </g>

  <!-- Additional dashed peripheral flows -->
  <g fill="none" stroke="#22d3ee" stroke-width="0.4" stroke-dasharray="2,4" opacity="0.04">
    <path d="M50,100 C150,120 220,160 300,200"/>
    <path d="M750,400 C680,360 620,320 550,280"/>
    <path d="M400,460 C350,420 250,380 180,350"/>
    <path d="M780,60 C730,90 690,120 650,150"/>
  </g>

  <!-- ============================================ -->
  <!-- HUB NODES (4 large, with concentric rings) -->
  <!-- ============================================ -->

  <!-- Hub 1: 300,200 -->
  <g>
    <circle cx="300" cy="200" r="18" fill="#22d3ee" opacity="0.025" filter="url(#fin-soft)"/>
    <circle cx="300" cy="200" r="14" fill="none" stroke="#22d3ee" stroke-width="0.4" opacity="0.08"/>
    <circle cx="300" cy="200" r="10" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.1"/>
    <circle cx="300" cy="200" r="6" fill="none" stroke="#22d3ee" stroke-width="0.6" opacity="0.14"/>
    <circle cx="300" cy="200" r="3.5" fill="#22d3ee" opacity="0.22"/>
    <circle cx="300" cy="200" r="1.5" fill="#22d3ee" opacity="0.4"/>
  </g>

  <!-- Hub 2: 550,280 -->
  <g>
    <circle cx="550" cy="280" r="16" fill="#22d3ee" opacity="0.02" filter="url(#fin-soft)"/>
    <circle cx="550" cy="280" r="12" fill="none" stroke="#22d3ee" stroke-width="0.4" opacity="0.08"/>
    <circle cx="550" cy="280" r="8.5" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.1"/>
    <circle cx="550" cy="280" r="5" fill="none" stroke="#22d3ee" stroke-width="0.6" opacity="0.14"/>
    <circle cx="550" cy="280" r="3" fill="#22d3ee" opacity="0.2"/>
    <circle cx="550" cy="280" r="1.3" fill="#22d3ee" opacity="0.38"/>
  </g>

  <!-- Hub 3: 180,350 -->
  <g>
    <circle cx="180" cy="350" r="14" fill="#22d3ee" opacity="0.02" filter="url(#fin-soft)"/>
    <circle cx="180" cy="350" r="11" fill="none" stroke="#22d3ee" stroke-width="0.4" opacity="0.07"/>
    <circle cx="180" cy="350" r="7.5" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.09"/>
    <circle cx="180" cy="350" r="4.5" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.12"/>
    <circle cx="180" cy="350" r="2.8" fill="#22d3ee" opacity="0.18"/>
    <circle cx="180" cy="350" r="1.2" fill="#22d3ee" opacity="0.35"/>
  </g>

  <!-- Hub 4: 650,150 -->
  <g>
    <circle cx="650" cy="150" r="13" fill="#22d3ee" opacity="0.018" filter="url(#fin-soft)"/>
    <circle cx="650" cy="150" r="10" fill="none" stroke="#22d3ee" stroke-width="0.4" opacity="0.07"/>
    <circle cx="650" cy="150" r="7" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.09"/>
    <circle cx="650" cy="150" r="4" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.12"/>
    <circle cx="650" cy="150" r="2.5" fill="#22d3ee" opacity="0.18"/>
    <circle cx="650" cy="150" r="1.1" fill="#22d3ee" opacity="0.35"/>
  </g>

  <!-- ============================================ -->
  <!-- REGULAR NODES (30+ scattered) -->
  <!-- ============================================ -->

  <!-- Hub 1 cluster nodes -->
  <g fill="#22d3ee">
    <circle cx="240" cy="160" r="2" opacity="0.18"/>
    <circle cx="350" cy="150" r="1.8" opacity="0.16"/>
    <circle cx="370" cy="210" r="2" opacity="0.17"/>
    <circle cx="280" cy="270" r="1.8" opacity="0.15"/>
    <circle cx="230" cy="220" r="1.6" opacity="0.14"/>
    <circle cx="320" cy="140" r="1.5" opacity="0.13"/>
    <circle cx="260" cy="250" r="1.8" opacity="0.15"/>
    <circle cx="350" cy="250" r="1.7" opacity="0.14"/>
    <circle cx="220" cy="180" r="1.6" opacity="0.14"/>
    <circle cx="340" cy="180" r="1.5" opacity="0.13"/>
  </g>

  <!-- Hub 2 cluster nodes -->
  <g fill="#22d3ee">
    <circle cx="500" cy="250" r="2" opacity="0.17"/>
    <circle cx="610" cy="260" r="1.8" opacity="0.16"/>
    <circle cx="580" cy="340" r="1.8" opacity="0.15"/>
    <circle cx="490" cy="310" r="1.7" opacity="0.14"/>
    <circle cx="600" cy="300" r="1.6" opacity="0.13"/>
    <circle cx="530" cy="220" r="1.8" opacity="0.15"/>
    <circle cx="510" cy="330" r="1.6" opacity="0.13"/>
    <circle cx="590" cy="230" r="1.7" opacity="0.14"/>
    <circle cx="480" cy="270" r="1.5" opacity="0.13"/>
  </g>

  <!-- Hub 3 cluster nodes -->
  <g fill="#22d3ee">
    <circle cx="130" cy="320" r="1.8" opacity="0.15"/>
    <circle cx="220" cy="380" r="1.7" opacity="0.14"/>
    <circle cx="150" cy="400" r="1.6" opacity="0.13"/>
    <circle cx="240" cy="340" r="1.8" opacity="0.15"/>
    <circle cx="120" cy="370" r="1.5" opacity="0.12"/>
    <circle cx="200" cy="300" r="1.7" opacity="0.14"/>
    <circle cx="160" cy="410" r="1.5" opacity="0.12"/>
    <circle cx="230" cy="310" r="1.6" opacity="0.13"/>
  </g>

  <!-- Hub 4 cluster nodes -->
  <g fill="#22d3ee">
    <circle cx="700" cy="130" r="1.8" opacity="0.15"/>
    <circle cx="610" cy="120" r="1.7" opacity="0.14"/>
    <circle cx="690" cy="180" r="1.6" opacity="0.13"/>
    <circle cx="620" cy="180" r="1.7" opacity="0.14"/>
    <circle cx="680" cy="100" r="1.5" opacity="0.12"/>
    <circle cx="600" cy="160" r="1.6" opacity="0.13"/>
    <circle cx="710" cy="160" r="1.5" opacity="0.12"/>
  </g>

  <!-- Peripheral / isolated nodes -->
  <g fill="#22d3ee">
    <circle cx="200" cy="120" r="1.3" opacity="0.1"/>
    <circle cx="400" cy="110" r="1.4" opacity="0.11"/>
    <circle cx="460" cy="200" r="1.5" opacity="0.12"/>
    <circle cx="660" cy="230" r="1.3" opacity="0.1"/>
    <circle cx="620" cy="380" r="1.4" opacity="0.11"/>
    <circle cx="100" cy="280" r="1.3" opacity="0.1"/>
    <circle cx="270" cy="410" r="1.4" opacity="0.11"/>
    <circle cx="740" cy="100" r="1.2" opacity="0.09"/>
    <circle cx="570" cy="90" r="1.3" opacity="0.1"/>
    <circle cx="110" cy="430" r="1.2" opacity="0.09"/>
    <circle cx="50" cy="100" r="1.1" opacity="0.08"/>
    <circle cx="750" cy="400" r="1.1" opacity="0.08"/>
    <circle cx="400" cy="460" r="1.2" opacity="0.09"/>
    <circle cx="780" cy="60" r="1" opacity="0.07"/>
    <circle cx="70" cy="200" r="1.1" opacity="0.08"/>
    <circle cx="430" cy="350" r="1.3" opacity="0.1"/>
    <circle cx="350" cy="380" r="1.2" opacity="0.09"/>
    <circle cx="720" cy="320" r="1.2" opacity="0.09"/>
    <circle cx="80" cy="440" r="1" opacity="0.07"/>
    <circle cx="450" cy="50" r="1.1" opacity="0.08"/>
  </g>

  <!-- Faint background grid suggestion -->
  <g stroke="#22d3ee" stroke-width="0.2" opacity="0.02">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
  </g>

  <!-- Vignette -->
  <radialGradient id="fin-vignette" cx="0.45" cy="0.48" r="0.65">
    <stop offset="0%" stop-color="#0a0f1a" stop-opacity="0"/>
    <stop offset="100%" stop-color="#050912" stop-opacity="0.55"/>
  </radialGradient>
  <rect width="800" height="500" fill="url(#fin-vignette)"/>
</svg>