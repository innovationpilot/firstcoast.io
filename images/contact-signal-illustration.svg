<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">Contact illustration</title>
  <desc id="desc">A message bubble and signal beacon representing business outreach, discovery calls, and practical follow-up.</desc>
  <defs>
