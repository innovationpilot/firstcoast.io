<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="prop-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050912"/>
      <stop offset="40%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#0c1220"/>
    </linearGradient>
    <radialGradient id="prop-ambient" cx="0.4" cy="0.6" r="0.5">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#0a0f1a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="prop-ground-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="100%" stop-color="#080d17"/>
    </linearGradient>
    <filter id="prop-window-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="prop-soft">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="800" height="500" fill="url(#prop-sky)"/>
  <rect width="800" height="500" fill="url(#prop-ambient)"/>

  <!-- Stars -->
  <g fill="#8ecae6" opacity="0.12">
    <circle cx="80" cy="40" r="0.6"/>
    <circle cx="200" cy="70" r="0.8"/>
    <circle cx="350" cy="30" r="0.5"/>
    <circle cx="500" cy="55" r="0.7"/>
    <circle cx="650" cy="25" r="0.6"/>
    <circle cx="720" cy="80" r="0.5"/>
    <circle cx="130" cy="110" r="0.4"/>
    <circle cx="430" cy="90" r="0.6"/>
    <circle cx="580" cy="45" r="0.5"/>
    <circle cx="770" cy="50" r="0.4"/>
    <circle cx="40" cy="90" r="0.5"/>
    <circle cx="300" cy="100" r="0.4"/>
  </g>

  <!-- Horizon / perspective line -->
  <line x1="0" y1="400" x2="800" y2="400" stroke="#152238" stroke-width="0.5" opacity="0.3"/>

  <!-- Perspective grid lines converging to vanishing point -->
  <g stroke="#152238" stroke-width="0.3" opacity="0.08">
    <line x1="0" y1="500" x2="400" y2="300"/>
    <line x1="200" y1="500" x2="400" y2="300"/>
    <line x1="400" y1="500" x2="400" y2="300"/>
    <line x1="600" y1="500" x2="400" y2="300"/>
    <line x1="800" y1="500" x2="400" y2="300"/>
  </g>

  <!-- Ground plane -->
  <rect x="0" y="400" width="800" height="100" fill="url(#prop-ground-fade)"/>

  <!-- Ground surface lines -->
  <g stroke="#152238" stroke-width="0.3" opacity="0.12">
    <line x1="0" y1="410" x2="800" y2="410"/>
    <line x1="0" y1="430" x2="800" y2="430"/>
    <line x1="0" y1="460" x2="800" y2="460"/>
  </g>

  <!-- === MAIN BUILDING (left-center, brutalist angular) === -->
  <g>
    <!-- Building body -->
    <rect x="150" y="120" width="200" height="280" fill="#0f1d32"/>
    <!-- Left face (slight 3D perspective) -->
    <polygon points="130,130 150,120 150,400 130,410" fill="#0b1628"/>
    <!-- Top face -->
    <polygon points="130,130 150,120 350,120 330,130" fill="#111f35"/>

    <!-- Setback upper section -->
    <rect x="170" y="120" width="160" height="60" fill="#111f35"/>
    <rect x="165" y="118" width="170" height="4" fill="#152238"/>

    <!-- Horizontal floor lines -->
    <g stroke="#1a2840" stroke-width="0.5" opacity="0.3">
      <line x1="150" y1="160" x2="350" y2="160"/>
      <line x1="150" y1="200" x2="350" y2="200"/>
      <line x1="150" y1="240" x2="350" y2="240"/>
      <line x1="150" y1="280" x2="350" y2="280"/>
      <line x1="150" y1="320" x2="350" y2="320"/>
      <line x1="150" y1="360" x2="350" y2="360"/>
    </g>

    <!-- Vertical mullions -->
    <g stroke="#1a2840" stroke-width="0.3" opacity="0.2">
      <line x1="190" y1="120" x2="190" y2="400"/>
      <line x1="230" y1="120" x2="230" y2="400"/>
      <line x1="270" y1="120" x2="270" y2="400"/>
      <line x1="310" y1="120" x2="310" y2="400"/>
    </g>

    <!-- Window lights (scattered, some lit, some dark) -->
    <g filter="url(#prop-window-glow)">
      <!-- Floor 1 (top) -->
      <rect x="175" y="125" width="12" height="8" fill="#22d3ee" opacity="0.08"/>
      <rect x="195" y="125" width="12" height="8" fill="#d4a843" opacity="0.06"/>
      <rect x="255" y="125" width="12" height="8" fill="#22d3ee" opacity="0.05"/>
      <rect x="315" y="125" width="12" height="8" fill="#d4a843" opacity="0.04"/>

      <!-- Floor 2 -->
      <rect x="155" y="165" width="12" height="8" fill="#d4a843" opacity="0.07"/>
      <rect x="195" y="165" width="12" height="8" fill="#22d3ee" opacity="0.1"/>
      <rect x="235" y="165" width="12" height="8" fill="#22d3ee" opacity="0.06"/>
      <rect x="275" y="165" width="12" height="8" fill="#d4a843" opacity="0.08"/>
      <rect x="315" y="165" width="12" height="8" fill="#22d3ee" opacity="0.05"/>
      <rect x="335" y="165" width="12" height="8" fill="#d4a843" opacity="0.04"/>

      <!-- Floor 3 -->
      <rect x="155" y="205" width="12" height="8" fill="#22d3ee" opacity="0.09"/>
      <rect x="175" y="205" width="12" height="8" fill="#d4a843" opacity="0.06"/>
      <rect x="215" y="205" width="12" height="8" fill="#22d3ee" opacity="0.07"/>
      <rect x="275" y="205" width="12" height="8" fill="#d4a843" opacity="0.1"/>
      <rect x="295" y="205" width="12" height="8" fill="#22d3ee" opacity="0.05"/>
      <rect x="335" y="205" width="12" height="8" fill="#22d3ee" opacity="0.08"/>

      <!-- Floor 4 -->
      <rect x="155" y="245" width="12" height="8" fill="#d4a843" opacity="0.05"/>
      <rect x="195" y="245" width="12" height="8" fill="#22d3ee" opacity="0.11"/>
      <rect x="235" y="245" width="12" height="8" fill="#d4a843" opacity="0.07"/>
      <rect x="255" y="245" width="12" height="8" fill="#22d3ee" opacity="0.06"/>
      <rect x="315" y="245" width="12" height="8" fill="#d4a843" opacity="0.08"/>

      <!-- Floor 5 -->
      <rect x="175" y="285" width="12" height="8" fill="#22d3ee" opacity="0.08"/>
      <rect x="215" y="285" width="12" height="8" fill="#d4a843" opacity="0.09"/>
      <rect x="255" y="285" width="12" height="8" fill="#22d3ee" opacity="0.05"/>
      <rect x="295" y="285" width="12" height="8" fill="#22d3ee" opacity="0.1"/>
      <rect x="335" y="285" width="12" height="8" fill="#d4a843" opacity="0.06"/>

      <!-- Floor 6 -->
      <rect x="155" y="325" width="12" height="8" fill="#22d3ee" opacity="0.07"/>
      <rect x="195" y="325" width="12" height="8" fill="#22d3ee" opacity="0.06"/>
      <rect x="235" y="325" width="12" height="8" fill="#d4a843" opacity="0.1"/>
      <rect x="275" y="325" width="12" height="8" fill="#22d3ee" opacity="0.08"/>
      <rect x="315" y="325" width="12" height="8" fill="#d4a843" opacity="0.05"/>

      <!-- Floor 7 (ground) -->
      <rect x="155" y="365" width="12" height="8" fill="#d4a843" opacity="0.12"/>
      <rect x="175" y="365" width="12" height="8" fill="#d4a843" opacity="0.1"/>
      <rect x="215" y="365" width="12" height="8" fill="#22d3ee" opacity="0.07"/>
      <rect x="255" y="365" width="12" height="8" fill="#d4a843" opacity="0.09"/>
      <rect x="295" y="365" width="12" height="8" fill="#22d3ee" opacity="0.06"/>
      <rect x="335" y="365" width="12" height="8" fill="#d4a843" opacity="0.11"/>
    </g>

    <!-- Building entrance -->
    <rect x="220" y="375" width="40" height="25" fill="#0b1628"/>
    <rect x="222" y="377" width="16" height="23" fill="#0d1a2e"/>
    <rect x="242" y="377" width="16" height="23" fill="#0d1a2e"/>
    <!-- Entrance canopy -->
    <rect x="210" y="373" width="60" height="3" fill="#152238"/>

    <!-- Rooftop details -->
    <rect x="200" y="112" width="30" height="8" fill="#111f35"/>
    <rect x="280" y="108" width="8" height="12" fill="#152238"/>
    <rect x="282" y="100" width="4" height="8" fill="#1a2840"/>
  </g>

  <!-- === SECOND BUILDING (right, smaller, modern glass) === -->
  <g>
    <!-- Building body -->
    <rect x="480" y="200" width="130" height="200" fill="#0f1d32"/>
    <!-- Left face -->
    <polygon points="470,210 480,200 480,400 470,410" fill="#0b1628"/>
    <!-- Top -->
    <polygon points="470,210 480,200 610,200 600,210" fill="#111f35"/>

    <!-- Floor lines -->
    <g stroke="#1a2840" stroke-width="0.4" opacity="0.25">
      <line x1="480" y1="230" x2="610" y2="230"/>
      <line x1="480" y1="260" x2="610" y2="260"/>
      <line x1="480" y1="290" x2="610" y2="290"/>
      <line x1="480" y1="320" x2="610" y2="320"/>
      <line x1="480" y1="350" x2="610" y2="350"/>
      <line x1="480" y1="380" x2="610" y2="380"/>
    </g>

    <!-- Vertical mullions -->
    <g stroke="#1a2840" stroke-width="0.3" opacity="0.18">
      <line x1="510" y1="200" x2="510" y2="400"/>
      <line x1="545" y1="200" x2="545" y2="400"/>
      <line x1="580" y1="200" x2="580" y2="400"/>
    </g>

    <!-- Windows -->
    <g filter="url(#prop-window-glow)">
      <rect x="485" y="205" width="10" height="6" fill="#22d3ee" opacity="0.06"/>
      <rect x="515" y="205" width="10" height="6" fill="#d4a843" opacity="0.05"/>
      <rect x="585" y="205" width="10" height="6" fill="#22d3ee" opacity="0.04"/>

      <rect x="485" y="235" width="10" height="6" fill="#d4a843" opacity="0.08"/>
      <rect x="550" y="235" width="10" height="6" fill="#22d3ee" opacity="0.07"/>
      <rect x="585" y="235" width="10" height="6" fill="#d4a843" opacity="0.05"/>

      <rect x="515" y="265" width="10" height="6" fill="#22d3ee" opacity="0.09"/>
      <rect x="550" y="265" width="10" height="6" fill="#d4a843" opacity="0.06"/>
      <rect x="585" y="265" width="10" height="6" fill="#22d3ee" opacity="0.08"/>

      <rect x="485" y="295" width="10" height="6" fill="#22d3ee" opacity="0.06"/>
      <rect x="515" y="295" width="10" height="6" fill="#d4a843" opacity="0.1"/>
      <rect x="550" y="295" width="10" height="6" fill="#22d3ee" opacity="0.05"/>

      <rect x="485" y="325" width="10" height="6" fill="#d4a843" opacity="0.07"/>
      <rect x="550" y="325" width="10" height="6" fill="#22d3ee" opacity="0.08"/>
      <rect x="585" y="325" width="10" height="6" fill="#d4a843" opacity="0.06"/>

      <rect x="515" y="355" width="10" height="6" fill="#d4a843" opacity="0.09"/>
      <rect x="550" y="355" width="10" height="6" fill="#22d3ee" opacity="0.06"/>

      <rect x="485" y="385" width="10" height="6" fill="#d4a843" opacity="0.11"/>
      <rect x="515" y="385" width="10" height="6" fill="#d4a843" opacity="0.08"/>
      <rect x="585" y="385" width="10" height="6" fill="#22d3ee" opacity="0.05"/>
    </g>

    <!-- Rooftop -->
    <rect x="520" y="194" width="20" height="6" fill="#111f35"/>
    <rect x="560" y="191" width="6" height="9" fill="#152238"/>
  </g>

  <!-- === Small distant building (far right) === -->
  <g opacity="0.5">
    <rect x="680" y="300" width="60" height="100" fill="#0d1a2e"/>
    <g stroke="#1a2840" stroke-width="0.3" opacity="0.2">
      <line x1="680" y1="325" x2="740" y2="325"/>
      <line x1="680" y1="350" x2="740" y2="350"/>
      <line x1="680" y1="375" x2="740" y2="375"/>
    </g>
    <g filter="url(#prop-window-glow)">
      <rect x="688" y="305" width="8" height="5" fill="#d4a843" opacity="0.06"/>
      <rect x="710" y="330" width="8" height="5" fill="#22d3ee" opacity="0.05"/>
      <rect x="725" y="355" width="8" height="5" fill="#d4a843" opacity="0.07"/>
      <rect x="688" y="380" width="8" height="5" fill="#22d3ee" opacity="0.04"/>
    </g>
  </g>

  <!-- === Small distant building (far left) === -->
  <g opacity="0.35">
    <rect x="30" y="320" width="50" height="80" fill="#0d1a2e"/>
    <g filter="url(#prop-window-glow)">
      <rect x="38" y="328" width="7" height="5" fill="#d4a843" opacity="0.05"/>
      <rect x="55" y="355" width="7" height="5" fill="#22d3ee" opacity="0.04"/>
      <rect x="38" y="378" width="7" height="5" fill="#d4a843" opacity="0.06"/>
    </g>
  </g>

  <!-- Street/road surface -->
  <rect x="0" y="400" width="800" height="2" fill="#152238" opacity="0.4"/>

  <!-- Street light reflections on ground -->
  <g filter="url(#prop-soft)">
    <ellipse cx="240" cy="420" rx="40" ry="8" fill="#d4a843" opacity="0.02"/>
    <ellipse cx="545" cy="425" rx="30" ry="6" fill="#22d3ee" opacity="0.015"/>
  </g>

  <!-- Sidewalk detail -->
  <g stroke="#152238" stroke-width="0.3" opacity="0.1">
    <line x1="0" y1="405" x2="800" y2="405"/>
  </g>

  <!-- Atmospheric haze between buildings -->
  <rect x="350" y="300" width="130" height="100" fill="#0f1829" opacity="0.3"/>

  <!-- Vignette -->
  <radialGradient id="prop-vignette" cx="0.4" cy="0.5" r="0.65">
    <stop offset="0%" stop-color="#0a0f1a" stop-opacity="0"/>
    <stop offset="100%" stop-color="#050912" stop-opacity="0.55"/>
  </radialGradient>
  <rect width="800" height="500" fill="url(#prop-vignette)"/>
</svg>